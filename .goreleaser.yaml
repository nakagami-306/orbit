version: 2

before:
  hooks:
    - cmd: npm ci --prefix web
    - cmd: npm run build --prefix web

builds:
  - main: ./cmd/orbit/
    binary: orbit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "orbit_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  header: |
    <p align="center">
      <img src="https://raw.githubusercontent.com/nakagami-306/orbit/main/orbit-title.png" alt="Orbit" width="500">
    </p>

    ---
  footer: |
    ---
    **Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY }}/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
